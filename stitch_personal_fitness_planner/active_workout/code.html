<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&amp;family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#ffffff",
                      "on-secondary": "#002e69",
                      "surface-container-lowest": "#0e0e0e",
                      "on-primary-fixed-variant": "#3c4d00",
                      "surface-container-low": "#1c1b1b",
                      "on-secondary-container": "#00285c",
                      "error-container": "#93000a",
                      "surface-container-high": "#2a2a2a",
                      "surface-container-highest": "#353534",
                      "on-tertiary": "#303030",
                      "secondary-fixed-dim": "#adc6ff",
                      "error": "#ffb4ab",
                      "surface-tint": "#abd600",
                      "on-error": "#690005",
                      "primary-container": "#c3f400",
                      "on-tertiary-container": "#656464",
                      "primary-fixed-dim": "#abd600",
                      "tertiary-fixed-dim": "#c8c6c5",
                      "background": "#131313",
                      "tertiary": "#ffffff",
                      "secondary-fixed": "#d8e2ff",
                      "on-tertiary-fixed": "#1b1c1c",
                      "secondary-container": "#4b8eff",
                      "secondary": "#adc6ff",
                      "on-primary-fixed": "#161e00",
                      "tertiary-fixed": "#e4e2e1",
                      "primary-fixed": "#c3f400",
                      "on-primary": "#283500",
                      "inverse-primary": "#506600",
                      "outline-variant": "#444933",
                      "surface-container": "#201f1f",
                      "on-secondary-fixed-variant": "#004493",
                      "outline": "#8e9379",
                      "tertiary-container": "#e4e2e1",
                      "on-primary-container": "#556d00",
                      "inverse-on-surface": "#313030",
                      "surface-bright": "#393939",
                      "inverse-surface": "#e5e2e1",
                      "on-surface-variant": "#c4c9ac",
                      "on-secondary-fixed": "#001a41",
                      "surface-variant": "#353534",
                      "on-tertiary-fixed-variant": "#474746",
                      "on-error-container": "#ffdad6",
                      "surface-dim": "#131313",
                      "on-surface": "#e5e2e1",
                      "on-background": "#e5e2e1",
                      "surface": "#131313"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "16px",
                      "xs": "8px",
                      "sm": "12px",
                      "margin": "20px",
                      "md": "16px",
                      "lg": "24px",
                      "xl": "32px",
                      "base": "4px"
              },
              "fontFamily": {
                      "data-display": ["JetBrains Mono"],
                      "h1": ["Montserrat"],
                      "label-caps": ["Inter"],
                      "body-md": ["Inter"],
                      "h2": ["Montserrat"],
                      "body-lg": ["Inter"],
                      "h3": ["Montserrat"]
              },
              "fontSize": {
                      "data-display": ["28px", {"lineHeight": "1", "letterSpacing": "-0.04em", "fontWeight": "600"}],
                      "h1": ["40px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                      "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "h3": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-glow {
            box-shadow: 0px 0px 15px rgba(195, 244, 0, 0.2);
        }
        .machined-card {
            background: linear-gradient(180deg, rgba(30, 30, 30, 1) 0%, rgba(20, 20, 20, 1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top App Bar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-margin h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="font-h2 text-h2 font-black text-primary-fixed italic tracking-tighter">TITAN STRENGTH</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors Active: opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors Active: opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="flex-grow w-full max-w-md mx-auto px-margin pt-lg pb-32">
<!-- Exercise Header -->
<section class="mb-xl text-center">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-caps text-label-caps text-primary-fixed uppercase tracking-widest">Exercise 3 of 6</span>
<span class="font-data-display text-primary-fixed">00:24:12</span>
</div>
<h1 class="font-h1 text-h1 uppercase mb-base">BARBELL DEADLIFT</h1>
<div class="flex justify-center gap-sm">
<span class="bg-surface-container-high px-sm py-base rounded text-on-surface-variant font-label-caps text-label-caps">STRENGTH</span>
<span class="bg-surface-container-high px-sm py-base rounded text-on-surface-variant font-label-caps text-label-caps">POSTERIOR CHAIN</span>
</div>
</section>
<!-- Main Interaction Area: Bento Grid Layout -->
<div class="grid grid-cols-1 gap-md">
<!-- Rest Timer Component -->
<div class="machined-card rounded-xl border border-surface-container-highest p-lg flex flex-col items-center justify-center relative overflow-hidden active-glow">
<div class="absolute top-0 left-0 h-1 bg-gradient-to-r from-secondary-container to-primary-container w-[65%]"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-sm">Rest Timer</span>
<div class="font-data-display text-[64px] text-primary-fixed leading-none mb-md">01:14</div>
<div class="flex gap-md w-full">
<button class="flex-1 bg-surface-container-highest py-md rounded-lg font-h3 text-h3 text-primary-fixed border border-surface-container-highest active:scale-95 transition-all">
                        +30s
                    </button>
<button class="flex-1 border border-secondary-container text-secondary py-md rounded-lg font-h3 text-h3 active:scale-95 transition-all">
                        SKIP
                    </button>
</div>
</div>
<!-- Active Set Card -->
<div class="machined-card rounded-xl border-2 border-primary-fixed p-lg">
<div class="flex justify-between items-start mb-lg">
<div>
<span class="font-label-caps text-label-caps text-primary-fixed uppercase block mb-xs">Current Target</span>
<h3 class="font-h2 text-h2 leading-none">SET 3</h3>
</div>
<div class="text-right">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase block mb-xs">Previous Best</span>
<div class="font-data-display text-h3">140kg x 5</div>
</div>
</div>
<div class="grid grid-cols-2 gap-md mb-xl">
<div class="bg-surface-container-lowest p-md rounded-lg border border-surface-container-highest">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block mb-xs text-[10px]">WEIGHT (KG)</label>
<input class="bg-transparent border-none text-primary font-data-display text-data-display w-full focus:ring-0 p-0" type="number" value="145"/>
</div>
<div class="bg-surface-container-lowest p-md rounded-lg border border-surface-container-highest">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block mb-xs text-[10px]">REPS</label>
<input class="bg-transparent border-none text-primary font-data-display text-data-display w-full focus:ring-0 p-0" type="number" value="5"/>
</div>
</div>
<button class="w-full bg-primary-fixed text-on-primary-fixed py-lg rounded-lg font-h3 text-h3 uppercase active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    COMPLETE SET
                </button>
</div>
<!-- Set History / Queue -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-surface-container-highest">
<div class="px-lg py-md border-b border-surface-container-highest flex justify-between">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Set Log</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">3 of 5 Done</span>
</div>
<div class="divide-y divide-surface-container-highest">
<div class="flex items-center px-lg py-md bg-surface-container-low opacity-60">
<span class="font-data-display text-on-surface-variant w-12 text-sm">SET 1</span>
<span class="font-body-md text-on-surface-variant flex-grow">140kg x 5</span>
<span class="material-symbols-outlined text-primary-fixed" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex items-center px-lg py-md bg-surface-container-low opacity-60">
<span class="font-data-display text-on-surface-variant w-12 text-sm">SET 2</span>
<span class="font-body-md text-on-surface-variant flex-grow">145kg x 4</span>
<span class="material-symbols-outlined text-primary-fixed" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
</div>
<!-- Exercise Image Reference -->
<div class="relative h-48 rounded-xl overflow-hidden border border-surface-container-highest">
<img alt="Technique reference" class="w-full h-full object-cover grayscale opacity-50" data-alt="A cinematic, high-contrast photograph of a professional powerlifter's hands gripping a knurled steel barbell on a gym floor. The scene is lit with dramatic side-lighting in a dark, moody gym environment, emphasizing the muscular texture and chalk on the hands. The overall aesthetic is stealthy and premium with deep black shadows and sharp highlights, conveying intense focus and elite performance." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBlTQBMD16-hBYt2jk3v-GBjER_qvquLp5rhyfOuOGXI5fuyuPEXdD4e_L8AJCbpIWaUjedMCbCnzW16dsIzt27y42EtQKeyCOspEJVL4tC7Q3mVMkO3K7oP4vWu87Hzfr5BenNTL4H6jADDqGl4X55nplWKOnoMQihC1zmQusazSTOTyxoPSRK99S0wEbVrmkjH8ssmSeoKCKVhOWNsIZyi7XR3dTLovxwY1zF5dzUMEPOZuhIpKDndlOIP6tM6oDbPpuQjdm_mo"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-md left-md">
<button class="bg-surface-container-highest/80 backdrop-blur-md px-md py-sm rounded-lg flex items-center gap-xs text-on-surface">
<span class="material-symbols-outlined text-md" data-icon="play_circle">play_circle</span>
<span class="font-label-caps text-label-caps uppercase">Form Guide</span>
</button>
</div>
</div>
</div>
<!-- Secondary Actions -->
<div class="mt-xl flex flex-col gap-md">
<button class="w-full border border-surface-container-highest py-lg rounded-xl font-h3 text-h3 text-on-surface-variant uppercase active:scale-95 transition-all">
                NEXT EXERCISE
            </button>
<button class="w-full text-error font-label-caps text-label-caps uppercase tracking-widest py-md active:opacity-60 transition-opacity">
                END WORKOUT EARLY
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Hidden as this is a focused Task-Flow screen) -->
<!-- Suppressed per the 'Destination' Rule as we are in an active session -->
<!-- Persistent Timer Floating Element (Optional UX addition) -->
<div class="fixed bottom-margin left-margin right-margin h-16 bg-surface-container-highest rounded-xl border border-primary-fixed/30 flex items-center px-lg justify-between shadow-2xl z-50">
<div class="flex items-center gap-md">
<div class="w-2 h-2 rounded-full bg-primary-fixed animate-pulse"></div>
<span class="font-label-caps text-label-caps text-primary-fixed uppercase">Session Active</span>
</div>
<div class="font-data-display text-h3 text-primary-fixed">24:12</div>
</div>
</body></html>
